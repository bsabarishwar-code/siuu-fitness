<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Siuu Fitness - Track micro nutrients and dominate your health">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SIUU FITNESS">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>SIUU FITNESS</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0; padding: 0;
      background-color: #0A0A0A;
      height: 100%; overflow: hidden;
    }
    #loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; background: #0A0A0A; gap: 24px;
    }
    #loading-title {
      font-family: sans-serif; font-size: 28px;
      font-weight: 900; letter-spacing: 6px; color: #CC0000;
    }
    #loading-bar-bg { width: 200px; height: 3px; background: #1E1E1E; }
    #loading-bar {
      height: 3px; background: #CC0000; width: 0%;
      animation: load 1.6s ease-in-out forwards;
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 80%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-title">SIUU FITNESS</div>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  </div>

  <script>
    /* ── Hide loading screen on first frame ─────────────────────────── */
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });

    /* ── Register push notification service worker ──────────────────── */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          window._swReg = reg;
        }).catch(function(e) {
          console.warn('SW registration failed:', e);
        });
      });
    }

    /* ── Stored auth token (set by Flutter after login) ─────────────── */
    window._siuuToken = null;
    window.siuuSetToken = function(token) {
      window._siuuToken = token;
    };

    /* ── Request push permission + subscribe ────────────────────────── */
    window.siuuRequestPush = async function(vapidPublicKey) {
      if (!('Notification' in window) || !('serviceWorker' in navigator)) {
        return 'not_supported';
      }
      // iOS PWA: must be called from user gesture context
      let permission;
      try {
        permission = await Notification.requestPermission();
      } catch(e) {
        return 'error';
      }
      if (permission !== 'granted') return permission; // 'denied' or 'default'

      try {
        const reg = window._swReg || await navigator.serviceWorker.ready;

        // Convert base64url VAPID key to Uint8Array
        const base64 = (vapidPublicKey + '===').replace(/-/g,'+').replace(/_/g,'/');
        const raw = atob(base64);
        const appServerKey = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) appServerKey[i] = raw.charCodeAt(i);

        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: appServerKey
        });

        const subJson = sub.toJSON();
        const resp = await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + window._siuuToken
          },
          body: JSON.stringify(subJson)
        });
        if (!resp.ok) return 'server_error';
        return 'granted';
      } catch(e) {
        console.error('Push subscribe error:', e);
        return 'error';
      }
    };

    /* ── Check current push permission state ────────────────────────── */
    window.siuuPushPermission = function() {
      if (!('Notification' in window)) return 'not_supported';
      return Notification.permission; // 'default' | 'granted' | 'denied'
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
